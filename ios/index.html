<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GS1 AR Scanner Pro</title>
    <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
    <style>
        :root { --ios-green: #34C759; }
        body { font-family: -apple-system; background: #000; margin: 0; overflow: hidden; color: white; }
        
        /* 扫描容器 */
        #viewport { position: relative; width: 100vw; height: 60vh; background: #111; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #arCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* 状态监控面板（调试用） */
        #debug-console { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 10px; color: #0f0; background: rgba(0,0,0,0.5); padding: 5px; z-index: 100; pointer-events: none; }

        /* 结果面板 */
        #result-panel { height: 40vh; background: #1c1c1e; padding: 15px; overflow-y: auto; border-top: 1px solid #333; }
        .barcode-card { background: #2c2c2e; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--ios-green); }
        .val { font-family: monospace; color: var(--ios-green); font-weight: bold; }
        
        .start-layer { position: fixed; inset: 0; background: #000; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn { background: var(--ios-green); color: #000; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div id="debug-console">系统就绪...</div>

<div class="start-layer" id="startLayer">
    <h2>AR 扫描终端</h2>
    <button class="btn" onclick="init()">启动系统</button>
</div>

<div id="viewport">
    <video id="video" playsinline muted></video>
    <canvas id="arCanvas"></canvas>
</div>

<div id="result-panel">
    <div id="list"></div>
</div>

<script>
    const logEl = document.getElementById('debug-console');
    const video = document.getElementById('video');
    const canvas = document.getElementById('arCanvas');
    const ctx = canvas.getContext('2d');
    const listEl = document.getElementById('list');

    let codeReader;
    let isDecoding = false; // 解码锁，防止堆栈溢出

    function logger(msg) {
        logEl.innerText = msg;
        console.log(msg);
    }

    async function init() {
        document.getElementById('startLayer').style.display = 'none';
        logger("正在初始化解码引擎...");

        // 初始化 ZXing
        codeReader = new ZXing.BrowserMultiFormatReader();
        
        try {
            // 获取摄像头：iPhone Pro 建议使用 1280x720，平衡识别精度与功耗
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            video.srcObject = stream;
            await video.play();

            logger("摄像头已连接，启动 AR 循环...");
            
            // 确保画布尺寸与视频显示尺寸一致
            canvas.width = video.offsetWidth;
            canvas.height = video.offsetHeight;

            requestAnimationFrame(renderLoop);
        } catch (err) {
            logger("错误: " + err.message);
        }
    }

    async function renderLoop() {
        // 1. 如果上一帧还在解析，则跳过此帧，避免卡死
        if (isDecoding) {
            requestAnimationFrame(renderLoop);
            return;
        }

        isDecoding = true;

        try {
            // 2. 核心：从当前视频元素抓取并解析（支持多码）
            const results = await codeReader.decodeFromVideoElement(video);
            
            // 如果执行到这里说明有结果
            if (results) {
                drawAR(results);
                updateList(results);
            }
        } catch (err) {
            // ZXing 在没扫到码时会抛出异常，这是正常的，清空画布即可
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!(err instanceof ZXing.NotFoundException)) {
                logger("解析异常: " + err.name);
            }
        } finally {
            isDecoding = false;
            requestAnimationFrame(renderLoop);
        }
    }

    function drawAR(result) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 获取坐标点
        const points = result.getResultPoints();
        if (!points || points.length === 0) return;

        // 计算缩放比例 (视频原始尺寸 vs 画布显示尺寸)
        const scaleX = canvas.width / video.videoWidth;
        const scaleY = canvas.height / video.videoHeight;

        const mappedPoints = points.map(p => ({
            x: p.x * scaleX,
            y: p.y * scaleY
        }));

        // 绘制追踪框
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#34C759';
        ctx.fillStyle = 'rgba(52, 199, 89, 0.2)';
        
        ctx.moveTo(mappedPoints[0].x, mappedPoints[0].y);
        for(let i=1; i<mappedPoints.length; i++) {
            ctx.lineTo(mappedPoints[i].x, mappedPoints[i].y);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fill();

        // 绘制浮动文字
        ctx.fillStyle = "#fff";
        ctx.font = "14px monospace";
        ctx.fillText(result.getText().substring(0, 20), mappedPoints[0].x, mappedPoints[0].y - 10);
    }

    function updateList(result) {
        const text = result.getText();
        const type = result.getBarcodeFormat();
        
        // 简单展示，实际可加入 GS1 解析逻辑
        listEl.innerHTML = `
            <div class="barcode-card">
                <div style="font-size:11px; color:#888; margin-bottom:5px">格式: ${type}</div>
                <div class="val">${text}</div>
                <div style="font-size:12px; margin-top:5px; color:#34C759">● 实时追踪中</div>
            </div>
        `;
    }
</script>
</body>
</html>
