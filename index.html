<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GS1 AR 跟随扫描器</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; overflow: hidden; }
        
        /* 扫描容器 */
        #reader-wrapper { position: relative; width: 100vw; height: 100vh; background: #000; }
        #reader { width: 100% !important; height: 100% !important; border: none !important; }
        
        /* AR 绘图层：关键 */
        #ar-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 100;
            pointer-events: none; /* 让点击穿透到下层 */
        }

        /* 底部信息面板：半透明 iOS 风格 */
        #info-panel {
            position: absolute;
            bottom: 30px; left: 15px; right: 15px;
            background: rgba(28, 28, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 20px;
            z-index: 200;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transform: translateY(120%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #info-panel.active { transform: translateY(0); }

        .ai-card { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        .ai-row { display: flex; align-items: flex-start; margin-bottom: 8px; }
        .ai-tag { background: var(--ios-green); color: #000; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-right: 10px; margin-top: 2px; }
        .ai-val { color: #fff; font-family: monospace; font-size: 15px; word-break: break-all; }
        .status-dot { display: inline-block; width: 8px; height: 8px; background: var(--ios-green); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px var(--ios-green); }
    </style>
</head>
<body>

<div id="reader-wrapper">
    <div id="reader"></div>
    <canvas id="ar-canvas"></canvas>
</div>

<div id="info-panel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="color: #8e8e93; font-size: 12px; font-weight: 600;">
            <span class="status-dot"></span>已锁定条码: <span id="res-format" style="color:#fff"></span>
        </div>
        <button onclick="hidePanel()" style="background:none; border:none; color:var(--ios-blue); font-size:14px; font-weight:600;">收起</button>
    </div>
    <div id="res-content" class="ai-card"></div>
</div>

<script>
    const html5QrCode = new Html5Qrcode("reader");
    const arCanvas = document.getElementById('ar-canvas');
    const ctx = arCanvas.getContext('2d');
    const infoPanel = document.getElementById('info-panel');
    const resContent = document.getElementById('res-content');
    const resFormat = document.getElementById('res-format');

    let isLocked = false;
    let lockTimer = null;

    // --- GS1 解析逻辑 ---
    const AIDict = { "01": "GTIN", "10": "批次号", "11": "生产日期", "17": "有效期", "21": "序列号", "10": "批次" };
    function parseGS1(text) {
        let clean = text.replace(/^\]C1|\]e0|\]d2/, "").replace(/[\x1c-\x1f]/g, '\x1d');
        let parts = [];
        if (clean.includes('\x1d') || clean.match(/^(01|17|10|21)/)) {
            // 简单演示解析逻辑
            if (clean.startsWith("01")) parts.push({ ai: "01", label: "GTIN", val: clean.substring(2, 16) });
            else parts.push({ ai: "CODE", label: "内容", val: clean.substring(0, 20) });
        } else {
            parts.push({ ai: "TXT", label: "原始文本", val: clean });
        }
        return parts;
    }

    // --- 启动扫描 ---
    async function start() {
        const config = { 
            fps: 25, 
            qrbox: (w, h) => { return { width: w * 0.8, height: h * 0.4 } }, // 限制扫描区域提高性能
            aspectRatio: window.innerHeight / window.innerWidth 
        };

        try {
            await html5QrCode.start(
                { facingMode: "environment" },
                config,
                (text, result) => onScanSuccess(text, result)
            );
            
            // 初始化画布尺寸
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // 启动 AR 清洗循环
            requestAnimationFrame(clearLoop);
        } catch (err) {
            alert("启动失败: " + err);
        }
    }

    function resizeCanvas() {
        arCanvas.width = window.innerWidth;
        arCanvas.height = window.innerHeight;
    }

    // AR 持续清除逻辑（如果一定时间内没扫到，清除追踪框）
    function clearLoop() {
        if (!isLocked) {
            ctx.clearRect(0, 0, arCanvas.width, arCanvas.height);
        }
        requestAnimationFrame(clearLoop);
    }

    function onScanSuccess(decodedText, decodedResult) {
        // 1. 获取坐标点 (这是跟随的关键)
        const points = decodedResult.result.debugData?.transformedPoints || [];
        if (points.length > 0) {
            drawTrackingBox(points, decodedText);
        }

        // 2. 更新面板信息
        isLocked = true;
        clearTimeout(lockTimer);
        lockTimer = setTimeout(() => { isLocked = false; }, 500); // 0.5秒内没扫到则认为丢失目标

        showPanel(decodedText, decodedResult.result.format.formatName);
    }

    function drawTrackingBox(points, text) {
        // 获取实际视频元素，用于坐标转换
        const video = document.querySelector('#reader video');
        if (!video) return;

        ctx.clearRect(0, 0, arCanvas.width, arCanvas.height);

        // 计算视频像素到屏幕像素的比例
        const scaleX = arCanvas.width / video.videoWidth;
        const scaleY = arCanvas.height / video.videoHeight;

        // 转换点坐标
        const mapped = points.map(p => ({
            x: p.x * scaleX,
            y: p.y * scaleY
        }));

        // 绘制 AR 追踪框
        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#34C759';
        ctx.lineJoin = "round";
        ctx.moveTo(mapped[0].x, mapped[0].y);
        mapped.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();

        // 绘制跟随的小标签
        ctx.fillStyle = "#34C759";
        ctx.font = "bold 14px -apple-system";
        ctx.fillText("已锁定", mapped[0].x, mapped[0].y - 15);
    }

    function showPanel(text, format) {
        resFormat.innerText = format;
        const data = parseGS1(text);
        resContent.innerHTML = data.map(d => `
            <div class="ai-row">
                <span class="ai-tag">${d.ai}</span>
                <span class="ai-val">${d.val}</span>
            </div>
        `).join('');
        infoPanel.classList.add('active');
    }

    function hidePanel() {
        infoPanel.classList.remove('active');
    }

    start();
</script>
</body>
</html>
