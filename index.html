<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone Pro - AR GS1 扫描终端</title>
    <style>
        :root { --ios-blue: #007AFF; --bg: #000; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 0; overflow: hidden; color: white; }
        
        /* AR 容器：视频与画布绝对重合 */
        #ar-container { position: relative; width: 100vw; height: 60vh; background: #111; overflow: hidden; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #cameraFeed { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #arCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none; z-index: 10; }
        
        /* 扫描线动画 */
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(52, 199, 89, 0.8); box-shadow: 0 0 20px #34C759, 0 0 40px #34C759; z-index: 5; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        /* 底部结果面板 */
        #resultPanel { height: 40vh; padding: 20px; overflow-y: auto; background: #1c1c1e; box-sizing: border-box; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .status-text { font-size: 14px; color: #8e8e93; font-weight: 600; }
        .fps-counter { font-size: 12px; color: #34C759; font-family: monospace; background: rgba(52, 199, 89, 0.1); padding: 3px 8px; border-radius: 10px; }
        
        /* 解析卡片 */
        .barcode-card { background: #2c2c2e; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #34C759; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .raw-data { font-size: 12px; color: #8e8e93; font-family: monospace; word-break: break-all; margin-bottom: 10px; }
        
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid #3a3a3c; }
        .data-row:last-child { border-bottom: none; }
        .label { font-size: 13px; color: #aaa; margin-bottom: 2px; }
        .ai-tag { font-size: 11px; background: #48484a; color: #ddd; padding: 2px 5px; border-radius: 4px; margin-right: 6px; font-weight: 600;}
        .value { font-size: 15px; font-weight: 600; color: #fff; font-family: monospace; letter-spacing: 0.5px; }
        
        .copy-btn { background: #3a3a3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s;}
        .copy-btn:active { background: #555; }
        
        /* 启动按钮层 */
        #startLayer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .start-btn { background: #34C759; color: black; border: none; padding: 16px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4); cursor: pointer; }
    </style>
</head>
<body>

    <div id="startLayer">
        <h2 style="margin:0; font-weight: 800;">AR 扫描终端</h2>
        <p style="color: #8e8e93; font-size: 14px;">专为 iPhone Pro 硬件加速优化</p>
        <button class="start-btn" onclick="initARScanner()">启动摄像头</button>
    </div>

    <div id="ar-container">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <canvas id="arCanvas"></canvas>
        <div class="scan-line"></div>
    </div>

    <div id="resultPanel">
        <div class="status-bar">
            <div class="status-text" id="statusText">正在寻找目标...</div>
            <div class="fps-counter" id="fpsCounter">0 FPS</div>
        </div>
        <div id="cardsContainer"></div>
    </div>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('arCanvas');
        const ctx = canvas.getContext('2d');
        const cardsContainer = document.getElementById('cardsContainer');
        const statusText = document.getElementById('statusText');
        const fpsCounter = document.getElementById('fpsCounter');
        
        let detector;
        let lastTime = 0;
        let frames = 0;
        
        // 用于防止底部列表疯狂闪烁的缓存字典
        let currentBarcodesMap = new Map();

        // --- GS1 核心解析引擎 (完美继承上一版的逻辑) ---
        const AIDict = {
            "00": { len: 18, label: "SSCC" }, "01": { len: 14, label: "GTIN" }, "02": { len: 14, label: "物流单元码" },
            "10": { len: 'var', label: "批次号" }, "11": { len: 6, label: "生产日期" }, "15": { len: 6, label: "最佳日期" },
            "17": { len: 6, label: "有效期" }, "20": { len: 2, label: "产品变体" }, "21": { len: 'var', label: "序列号" },
            "30": { len: 'var', label: "数量" }, "240": { len: 'var', label: "附加标识" }, "241": { len: 'var', label: "客户部件号" }
        };

        function getAIRule(text, i) {
            for (let len = 4; len >= 2; len--) {
                if (i + len <= text.length) {
                    let tempAi = text.substring(i, i + len);
                    if (AIDict[tempAi]) return { ai: tempAi, rule: AIDict[tempAi] };
                    if (len === 2 && tempAi.match(/^9[0-9]$/)) return { ai: tempAi, rule: { len: 'var', label: `企业自定义 (${tempAi})` } };
                    if (len === 4 && tempAi.match(/^31[0-6][0-9]$/)) return { ai: tempAi, rule: { len: 6, label: `净重/体积 (${tempAi})` } };
                }
            }
            return null; 
        }

        function preprocessText(text) {
            let clean = text.replace(/^\][A-Za-z0-9]{2}/, "");
            return clean.replace(/[\x1c-\x1f\ufffd□]/g, '\x1d');
        }

        function smartParse(rawText, format) {
            let cleanText = preprocessText(rawText);
            if (format === "ean_13" || format === "upc_a") return [{ ai: "EAN", label: "标准商品条码", value: rawText }];
            if (format === "qr_code" && !/^\d/.test(cleanText) && !cleanText.includes('\x1d')) {
                return [{ ai: "TXT", label: "普通文本", value: rawText }];
            }
            
            // GS1 解析
            let results = [];
            let i = 0;
            if (getAIRule(cleanText, 0) === null && !cleanText.includes('\x1d')) return [{ ai: "TXT", label: "非标准段落", value: cleanText }];

            while (i < cleanText.length) {
                if (cleanText[i] === '\x1d') { i++; continue; }
                let match = getAIRule(cleanText, i);
                if (match) {
                    let rule = match.rule;
                    i += match.ai.length; 
                    if (rule.len === 'var') {
                        let nextFnc1 = cleanText.indexOf('\x1d', i);
                        if (nextFnc1 === -1) { results.push({ ai: match.ai, label: rule.label, value: cleanText.substring(i) }); break; }
                        else { results.push({ ai: match.ai, label: rule.label, value: cleanText.substring(i, nextFnc1) }); i = nextFnc1 + 1; }
                    } else {
                        results.push({ ai: match.ai, label: rule.label, value: cleanText.substring(i, i + rule.len) });
                        i += rule.len; 
                    }
                } else {
                    let nextFnc1 = cleanText.indexOf('\x1d', i);
                    if (nextFnc1 === -1) { results.push({ ai: "??", label: "未知字段", value: cleanText.substring(i) }); break; }
                    else { results.push({ ai: "??", label: "未知字段", value: cleanText.substring(i, nextFnc1) }); i = nextFnc1 + 1; }
                }
            }
            return results;
        }

        // --- AR 初始化与循环逻辑 ---
        async function initARScanner() {
            if (!('BarcodeDetector' in window)) {
                alert("当前浏览器不支持硬件级 BarcodeDetector API。请确保使用 iOS 17+ 的 Safari 浏览器。");
                return;
            }

            document.getElementById('startLayer').style.display = 'none';
            
            try {
                // 开启后置主摄，请求高分辨率
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = stream;
                
                detector = new BarcodeDetector({ 
                    formats: ['data_matrix', 'qr_code', 'ean_13', 'code_128', 'pdf417'] 
                });

                video.addEventListener('play', () => {
                    // 同步 Canvas 的分辨率为视频的真实物理分辨率
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    requestAnimationFrame(arLoop);
                });

            } catch (err) {
                alert("摄像头启动失败: " + err.message);
            }
        }

        async function arLoop(timestamp) {
            // 计算 FPS
            if (timestamp - lastTime >= 1000) {
                fpsCounter.innerText = `${frames} FPS`;
                frames = 0;
                lastTime = timestamp;
            }
            frames++;

            try {
                // 将当前视频帧送入神经网络进行目标检测
                const barcodes = await detector.detect(video);
                
                // 清除上一帧的 AR 画面
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let newMap = new Map();

                if (barcodes.length > 0) {
                    statusText.innerText = `已锁定 ${barcodes.length} 个目标`;
                    statusText.style.color = "#34C759";

                    barcodes.forEach(barcode => {
                        const points = barcode.cornerPoints;
                        
                        // 1. 绘制科幻感十足的边界框 (Bounding Box)
                        ctx.beginPath();
                        ctx.moveTo(points[0].x, points[0].y);
                        for(let i=1; i<4; i++) ctx.lineTo(points[i].x, points[i].y);
                        ctx.closePath();
                        
                        // 框线样式
                        ctx.lineWidth = 8;
                        ctx.strokeStyle = '#34C759';
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(52, 199, 89, 0.2)';
                        ctx.fill();

                        // 2. 在框上方绘制浮动数据标签
                        const rawVal = barcode.rawValue;
                        const shortVal = rawVal.length > 15 ? rawVal.substring(0, 15) + "..." : rawVal;
                        
                        ctx.font = "bold 40px -apple-system, sans-serif";
                        const textWidth = ctx.measureText(shortVal).width;
                        
                        // 画背景黑条
                        ctx.fillStyle = 'rgba(0,0,0,0.7)';
                        ctx.fillRect(points[0].x, points[0].y - 60, textWidth + 20, 50);
                        // 画文字
                        ctx.fillStyle = '#FFF';
                        ctx.fillText(shortVal, points[0].x + 10, points[0].y - 20);

                        // 3. 将数据送入底部面板渲染队列
                        newMap.set(rawVal, barcode.format);
                    });
                } else {
                    statusText.innerText = "正在寻找目标...";
                    statusText.style.color = "#8e8e93";
                }

                // 4. 更新底部面板 (仅当检测到的条码发生变化时才重新渲染 HTML，避免卡顿)
                updateCardsUI(newMap);
                currentBarcodesMap = newMap;

            } catch (e) {
                console.error(e);
            }

            // 无限循环下一帧
            requestAnimationFrame(arLoop);
        }

        function updateCardsUI(newMap) {
            // 简单的差异比对，如果有新加入的码，重新渲染
            let shouldRender = false;
            if (newMap.size !== currentBarcodesMap.size) shouldRender = true;
            else {
                for (let key of newMap.keys()) {
                    if (!currentBarcodesMap.has(key)) shouldRender = true;
                }
            }

            if (!shouldRender) return;

            if (newMap.size === 0) {
                cardsContainer.innerHTML = `<div style="text-align:center; color:#555; margin-top:40px; font-size:14px;">请将条码放入屏幕中<br>(支持同时扫描多个)</div>`;
                return;
            }

            let html = "";
            newMap.forEach((format, rawValue) => {
                const elements = smartParse(rawValue, format);
                
                let rowsHtml = elements.map(el => {
                    let cleanValue = el.value.replace(/\x1d/g, ''); 
                    return `
                    <div class="data-row">
                        <div>
                            <div class="label"><span class="ai-tag">${el.ai}</span>${el.label}</div>
                            <div class="value">${cleanValue}</div>
                        </div>
                        <button class="copy-btn" onclick="copyText(this, '${cleanValue}')">复制</button>
                    </div>`
                }).join('');

                html += `
                <div class="barcode-card">
                    <div class="raw-data">源: ${preprocessText(rawValue).replace(/\x1d/g, '[FNC1]')}</div>
                    ${rowsHtml}
                </div>`;
            });

            cardsContainer.innerHTML = html;
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                let oldText = btn.innerText;
                btn.innerText = "完成";
                btn.style.background = "#34C759";
                btn.style.color = "#000";
                setTimeout(() => { 
                    btn.innerText = oldText; 
                    btn.style.background = "#3a3a3c"; 
                    btn.style.color = "#fff";
                }, 1000);
            });
        }
    </script>
</body>
</html>
